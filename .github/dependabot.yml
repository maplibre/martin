version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule: { interval: monthly }
    groups:
      all-actions-version-updates:
        applies-to: version-updates
        patterns: [ '*' ]
      all-actions-security-updates:
        applies-to: security-updates
        patterns: [ '*' ]
    cooldown:
      default-days: 7
      # no semver support for github-actions
      # => no specific configuration for this
      include:
        - "*"

  - package-ecosystem: cargo
    directory: '/'
    schedule: { interval: monthly }
    open-pull-requests-limit: 10
    groups:
      all-cargo-version-updates:
        applies-to: version-updates
        patterns: [ '*' ]
        # These crates are intentionally excluded because specific newer versions
        # are broken (see deny.toml): libdeflater/libdeflate-sys@1.25.0 fail to
        # compile under musl; insta@1.45.0/1.45.1 fail `cargo test -- diff_and_patch`;
        # freetype-sys@0.23.0 / freetype-rs@0.38.0 / sdf_glyph_renderer@1.1.0 fail
        # to compile (missing zlib.h) on musl and Windows.
        # Keeping them out of the group gives each its own PR for manual review.
        exclude-patterns:
          - 'libdeflater'
          - 'libdeflate-sys'
          - 'insta'
          - 'freetype-sys'
          - 'freetype-rs'
          - 'sdf_glyph_renderer'
      all-cargo-security-updates:
        applies-to: security-updates
        patterns: [ '*' ]
    cooldown:
      default-days: 7
      include:
        - "*"

  - package-ecosystem: npm
    directories:
      - '/martin/martin-ui/'
      - '/demo/frontend/'
    schedule: { interval: monthly }
    open-pull-requests-limit: 10
    groups:
      all-npm-version-updates:
        applies-to: version-updates
        patterns: [ '*' ]
        exclude-patterns:
          - '@biomejs/biome'
      all-npm-security-updates:
        applies-to: security-updates
        patterns: [ '*' ]
    cooldown:
      default-days: 7
      include:
        - "*"

  - package-ecosystem: docker
    directories:
      - '/demo/db'
      - '/demo/frontend'
    schedule: { interval: monthly }
    open-pull-requests-limit: 10
    groups:
      all-npm-version-updates:
        applies-to: version-updates
        patterns: [ '*' ]
      all-npm-security-updates:
        applies-to: security-updates
        patterns: [ '*' ]
    cooldown:
      default-days: 7
      include:
        - "*"
      exclude:
        - "ghcr.io/maplibre/martin"
