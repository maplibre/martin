name: Build Binary

on:
  workflow_call:
    inputs:
      target:
        description: 'Build target triple'
        required: true
        type: string
      os:
        description: 'Runner OS label'
        required: true
        type: string
      musl:
        description: 'Use cargo-zigbuild / zig for a musl static build'
        required: false
        type: boolean
        default: false
      use_cache:
        description: 'Enable Rust build cache (Swatinem/rust-cache)'
        required: false
        type: boolean
        default: false
      release_mode:
        description: 'Build in release mode with debug info stripped. Set to false for PR builds to reduce build time.'
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ inputs.target }}
    runs-on: ${{ inputs.os }}
    permissions:
      contents: read
    env:
      # Set RELEASE_MODE to '1' for release builds (push to main, releases, and manual workflow dispatches),
      # or empty for PR debug builds to reduce CI build time.
      RELEASE_MODE: ${{ inputs.release_mode && '1' || '' }}
    steps:
      - run: rustup update stable && rustup default stable
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - name: Install just
        uses: taiki-e/install-action@0abfcd587b70a713fdaa7fb502c885e2112acb15 # v2.75.7
        with: { tool: 'just' }
      - name: Install cargo-zigbuild (musl only)
        if: inputs.musl
        uses: taiki-e/install-action@0abfcd587b70a713fdaa7fb502c885e2112acb15 # v2.75.7
        with: { tool: 'cargo-zigbuild' }
      - name: Install zig (musl only)
        if: inputs.musl
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with: { version: '0.15.1' }
      # the macOS x86 runners are 3x slower than all other runners.
      # We need to cache here to not spend 30 minutes on each build.
      # We cannot cache the others as well because we only have 10GB of cache
      - if: inputs.use_cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Rust Versions
        run: rustc --version && cargo --version
      - name: Install NASM for rustls/aws-lc-rs on Windows
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
      - name: Install rendering dependencies
        if: runner.os == 'Linux' && !inputs.musl
        run: just install-dependencies

      - name: Build ${{ inputs.target }}
        if: ${{ !inputs.musl }}
        env:
          TARGET: ${{ inputs.target }}
        run: just build-release "$TARGET"
      - name: Build ${{ inputs.target }} (musl)
        if: inputs.musl
        env:
          TARGET: ${{ inputs.target }}
        run: just build-release-musl "$TARGET"
      - name: Move ${{ inputs.target }} artefacts to the target_releases directory
        env:
          TARGET: ${{ inputs.target }}
        run: just move-artifacts "$TARGET"

      - name: Save build artifacts to build-${{ inputs.target }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-${{ inputs.target }}
          path: target_releases/
