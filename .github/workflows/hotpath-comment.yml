name: hotpath-comment

on:
  workflow_run:
    workflows: ["hotpath-profile"]
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }

      - run: rustup update stable && rustup default stable

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: profile-metrics
          path: /tmp/metrics/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Install hotpath-utils CLI
        run: cargo install hotpath --features=utils --bin hotpath-utils --locked

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_BASE_REF_FILE: /tmp/metrics/base_ref.txt
          GITHUB_HEAD_REF_FILE: /tmp/metrics/head_ref.txt
        run: |
          set -euo pipefail
          export GITHUB_BASE_REF=$(cat "$GITHUB_BASE_REF_FILE")
          export GITHUB_HEAD_REF=$(cat "$GITHUB_HEAD_REF_FILE")
          hotpath-utils profile-pr \
            --head-metrics /tmp/metrics/head_timing.json \
            --base-metrics /tmp/metrics/base_timing.json \
            --github-token "$GH_TOKEN" \
            --pr-number "$(cat /tmp/metrics/pr_number.txt)" \
            --benchmark-id "timing"
