name: Hotpath comment

# zizmor: ignore[dangerous-triggers] -- intentional two-workflow split: the profile
# workflow runs untrusted PR code with read-only permissions, and this comment
# workflow only reads uploaded artifacts and posts a PR comment. Artifact contents
# are validated against the workflow_run event metadata before use.
on:
  workflow_run:
    workflows: ["Hotpath profile"]
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }

      - run: rustup update stable && rustup default stable

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: profile-metrics
          path: /tmp/metrics/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate artifact PR number against event metadata
        env:
          EXPECTED_PR: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          ARTIFACT_PR=$(cat /tmp/metrics/pr_number.txt)
          if [[ "$ARTIFACT_PR" != "$EXPECTED_PR" ]]; then
            echo "::error::Artifact PR number ($ARTIFACT_PR) does not match event metadata ($EXPECTED_PR)"
            exit 1
          fi

      - name: Install hotpath-utils CLI
        run: cargo install hotpath --features=utils --bin hotpath-utils --locked

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_BASE_REF: ${{ github.event.workflow_run.head_branch }}
          GITHUB_HEAD_REF: ${{ github.event.workflow_run.head_branch }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          hotpath-utils profile-pr \
            --head-metrics /tmp/metrics/head_timing.json \
            --base-metrics /tmp/metrics/base_timing.json \
            --github-token "$GH_TOKEN" \
            --pr-number "$PR_NUMBER" \
            --benchmark-id "timing"
