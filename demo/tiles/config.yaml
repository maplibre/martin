# Demo tiles service: Oberbayern pmtiles + Toner/Positron styles + fonts + Postgres
listen_addresses: "0.0.0.0:3000"

postgres:
  connection_string: $DATABASE_URL
  auto_publish:
    tables:
      id_columns: [id]
    functions: {}

pmtiles:
  sources:
    basemap: /mnt/output.mbtiles

styles:
  sources:
    toner: /data/styles/toner.json
    positron: /data/styles/positron.json

sprites:
  sources:
    icons: /data/sprites/icons

fonts:
  paths:
    - /data/fonts
