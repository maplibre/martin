gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_buffers      16 8k;
gzip_http_version 1.1;
gzip_min_length   256;
gzip_types        text/plain text/css text/xml text/javascript
                  application/javascript application/json
                  application/x-protobuf;

upstream tiles_upstream {
    server tiles:3000;
    keepalive 32;
}

server {
    listen 80;
    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_certificate     /etc/ssl/certs/cert.pem;
    ssl_certificate_key /etc/ssl/certs/private.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_name localhost;
    root        /usr/share/nginx/html;
    index       index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Proxy Martin tile/API service
    location /api/martin/ {
        # FIXME: Uncomment once in production
        #valid_referers none blocked server_names
        #                       ~^(.+\.)?maplibre\.org(/|$);

        #if ($invalid_referer) {
        #    return 403;
        #}

        rewrite ^/api/martin(.*)$ $1 break;
        proxy_pass              http://tiles_upstream;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host $host:$server_port;

        proxy_connect_timeout   30s;
        proxy_send_timeout      5m;
        proxy_read_timeout      5m;
    }

    # Cache hashed Astro assets indefinitely
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    error_page 500 502 503 504 /500.html;
    location = /500.html {
        internal;
    }
}
