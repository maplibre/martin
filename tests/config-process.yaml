---
# Test configuration for postprocessing features
# Used by the "process" integration test group.

listen_addresses: '0.0.0.0:3000'

# Global: default MLT encoder settings for all sources
convert_to_mlt: auto

# Database configuration
postgres:
  connection_string: '${DATABASE_URL:postgres://postgres@localhost:5432/db}'
  default_srid: 4326

  tables:
    # Table source with per-source MLT conversion enabled + gzip compression
    table_source:
      schema: public
      table: table_source
      srid: 4326
      geometry_column: geom
      geometry_type: GEOMETRY
      properties:
        gid: int4
      convert_to_mlt:
        tessellate: true

    # Table source with default (global) config
    points1:
      schema: public
      table: points1
      srid: 4326
      geometry_column: geom
      geometry_type: POINT
      properties:
        gid: int4

    # Table source with per-source override
    points2:
      schema: public
      table: points2
      srid: 4326
      geometry_column: geom
      geometry_type: POINT
      properties:
        gid: int4
      convert_to_mlt:
        try_spatial_hilbert_sort: true

mbtiles:
  sources:
    world_cities: tests/fixtures/mbtiles/world_cities.mbtiles

# Passthrough source self-proxying the `table_source` endpoint, so the proxy + cache +
# MVT<->MLT conversion path is exercised end-to-end against a real upstream.
passthrough:
  sources:
    passthrough_table:
      url: 'http://localhost:${MARTIN_PORT:3111}/table_source/{z}/{x}/{y}'
      format: mvt
